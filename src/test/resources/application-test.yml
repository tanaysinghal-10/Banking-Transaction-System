spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: never

server:
  port: 0

logging:
  level:
    root: WARN
    com.banking: DEBUG

app:
  idempotency:
    expiry-hours: 24
    cleanup-cron: "0 0 0 31 2 ?"
  retry:
    max-attempts: 3
    initial-interval-ms: 50
    multiplier: 2.0
    max-interval-ms: 500
